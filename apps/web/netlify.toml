# Monorepo: frontend in apps/web. Netlify runs install/build from repo root (workspaces).

[build]
  # Netlify will run in the site "Base directory".
  # Configure the site with:
  #   Base directory: .
  #   Package directory: apps/web
  # and let this file just describe how to build/publish.
  command = "npm run build:web"
  publish = "apps/web/.next"
